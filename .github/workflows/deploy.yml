name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Wrangler config
        run: node scripts/generate-wrangler-config.js production
        env:
          SUI3_DOMAIN_PRODUCTION: ${{ secrets.SUI3_DOMAIN_PRODUCTION }}
          SUI3_D1_DATABASE_ID_PRODUCTION: ${{ secrets.SUI3_D1_DATABASE_ID_PRODUCTION }}

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --config wrangler.production.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply sui3 --config wrangler.production.jsonc --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
